name: Generate Trophy SVG

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day at midnight UTC
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Clone trophy generator source
        run: git clone --depth 1 https://github.com/ryo-ma/github-profile-trophy.git trophy-src

      - name: Create output folder
        run: mkdir -p profile-assets

      - name: Generate trophy SVG
        run: |
          deno run --allow-net --allow-env --allow-read --allow-write \
            trophy-src/render_svg.ts maxchichar profile-assets radical
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename output file
        run: mv profile-assets/github-trophy.svg profile-assets/github-trophies.svg || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-assets/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update trophy image [skip ci]"
          git push
