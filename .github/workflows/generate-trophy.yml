name: Generate Trophy SVG

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day at midnight UTC
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Generate trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: maxchichar
          file: profile-assets/github-trophies.svg
          theme: radical
          no-frame: true
          no-background: true
          margin-width: 4
          max-rows: 2
          max-cols: 3
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p profile-assets
          git add profile-assets/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update trophy image [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
