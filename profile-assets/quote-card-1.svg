  <line x1="50" y1="178" x2="120" y2="178" stroke="#8B5CF6" stroke-width="2"/>
  <text x="50" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#C4B5FD" font-weight="bold">— Chibueze Maxwell</text>
