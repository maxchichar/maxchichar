<svg viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#2d1257"/>
    </linearGradient>
    <linearGradient id="borderGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="676" height="216" rx="16" fill="url(#cardGrad1)" stroke="url(#borderGrad1)" stroke-width="2"/>

  <rect x="2" y="2" width="8" height="216" rx="4" fill="#C084FC"/>

  <text x="48" y="56" font-family="Georgia, serif" font-size="46" fill="#8B5CF6" opacity="0.5">&#8220;</text>

  <text x="50" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#E9D5FF" font-style="italic">
    <tspan x="50" dy="0">Stop planning. Stop watching. Stop reading.</tspan>
    <tspan x="50" dy="30">Open your editor and write bad code.</tspan>
    <tspan x="50" dy="30">That's how you become good.</tspan>
