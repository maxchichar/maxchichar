<svg width="1400" height="120" viewBox="0 0 1400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="footAurora" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8A2BE2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="footLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C084FC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8A2BE2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="footText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="fBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <clipPath id="footClip">
      <rect x="0" y="0" width="1400" height="120" rx="20"/>
    </clipPath>
  </defs>

  <g clip-path="url(#footClip)">
    <rect width="1400" height="120" fill="url(#footBg)"/>
    <g filter="url(#fBlur)">
      <circle cx="700" cy="60" r="220" fill="url(#footAurora)">
        <animateTransform attributeName="transform" type="translate"
          values="0,0; 80,0; -80,0; 0,0" dur="36s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45 0 0.55 1; 0.45 0 0.55 1; 0.45 0 0.55 1"/>
      </circle>
    </g>

    <rect x="500" y="30" width="400" height="1" fill="url(#footLine)"/>

    <text x="700" y="68" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="500" letter-spacing="2.5" fill="url(#footText)">CRAFTED BY MAXCHICHAR</text>
    <text x="700" y="92" text-anchor="middle" font-family="'SF Mono','Menlo',monospace" font-size="11" letter-spacing="1.5" fill="#8A2BE2" opacity="0.8">SYSTEMS · INTELLIGENCE · INFRASTRUCTURE</text>
  </g>
</svg>
