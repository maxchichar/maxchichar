<svg viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="140" fill="transparent"/>
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle"
        font-family="DejaVu Sans Mono, monospace" font-weight="bold"
        font-size="64" letter-spacing="6"
        fill="url(#purpleGrad)" filter="url(#glow)">MAXCHICHAR</text>
  <text x="50%" y="92%" dominant-baseline="middle" text-anchor="middle"
        font-family="DejaVu Sans Mono, monospace" font-weight="bold"
        font-size="13" letter-spacing="4"
        fill="#8B5CF6" opacity="0.85">THE ARCHITECT &#8226; SYSTEM BUILDER &#8226; DIGITAL EMPIRE</text>
</svg>
